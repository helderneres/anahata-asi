<h2>Anahata ASI Studio: Artificial Super Intelligence for NetBeans</h2>\
<p><strong>Anahata ASI</strong> is the V2 evolution of the NetBeans-native AI Agent. \
Built on a model-agnostic core and a modular architecture, it provides even deeper IDE integration and a refined user experience.</p>\
<ul>\
    <li><strong>Model Agnostic:</strong> Seamlessly switch between different AI providers.</li>\
    <li><strong>Refined Context Management:</strong> Advanced pruning and pinning logic for optimal token usage.</li>\
    <li><strong>Deep IDE Integration:</strong> Intuitive interaction with your projects, code, and development environment.</li>\
</ul>\
<hr>\
<p><em>Built with passion for the NetBeans community. Visca el Barsa! </em></p>\
